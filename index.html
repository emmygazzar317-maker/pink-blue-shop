<style>
:root{--p:#FF6B9D;--s:#4A90D9;--a:#FFD93D;--d:#1a1a2e;--g:linear-gradient(135deg,#FF6B9D,#4A90D9,#9b59b6)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--d);color:#fff;min-height:100vh}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
.bg::before{content:'';position:absolute;width:200%;height:200%;background:radial-gradient(circle,rgba(255,107,157,.1),transparent 50%),radial-gradient(circle,rgba(74,144,217,.1) 30%,transparent 60%);animation:bgM 20s infinite}
@keyframes bgM{0%,100%{transform:translate(-10%,-10%) rotate(0)}50%{transform:translate(10%,10%) rotate(180deg)}}
header{position:fixed;width:100%;top:0;z-index:1000;background:rgba(26,26,46,.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.1)}
.hc{max-width:1400px;margin:0 auto;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:15px;text-decoration:none}
.logo img{width:55px;height:55px;border-radius:50%;border:3px solid transparent;background:var(--g);padding:2px;animation:lg 3s infinite}
@keyframes lg{0%,100%{box-shadow:0 0 20px rgba(255,107,157,.5)}50%{box-shadow:0 0 40px rgba(74,144,217,.8)}}
.lt{font-size:1.8rem;font-weight:900;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:10px;list-style:none}
.nav a{color:rgba(255,255,255,.8);text-decoration:none;font-weight:700;padding:10px 20px;border-radius:30px;transition:all .3s}
.nav a:hover{background:var(--g);color:#fff;transform:translateY(-2px)}
.cart{position:relative;cursor:pointer;font-size:1.5rem;padding:10px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);transition:all .3s}
.cart:hover{background:var(--g);transform:scale(1.1)}
.cc{position:absolute;top:-5px;right:-5px;background:var(--a);color:var(--d);font-size:.75rem;font-weight:900;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:pu 2s infinite}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.hero{margin-top:90px;padding:80px 30px 60px;text-align:center}
.badge{display:inline-block;padding:8px 25px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:50px;font-size:.9rem;font-weight:700;color:var(--a);margin-bottom:30px;animation:fd 1s}
.hero h1{font-size:4rem;font-weight:900;margin-bottom:25px;animation:fu 1s .2s both}
.gt{background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:1.3rem;color:rgba(255,255,255,.7);max-width:600px;margin:0 auto 40px;animation:fu 1s .4s both}
.phones{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;animation:fu 1s .6s both}
.pb{display:flex;align-items:center;gap:12px;padding:15px 35px;border-radius:50px;text-decoration:none;font-weight:800;color:#fff;background:var(--g);transition:all .4s}
.pb:hover{transform:translateY(-5px) scale(1.05);box-shadow:0 15px 40px rgba(255,107,157,.4)}
@keyframes fu{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fd{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.hero-img-section{text-align:center;padding:20px 30px 40px;max-width:1200px;margin:0 auto;animation:fu 1s .8s both}
.hero-img-container{position:relative;display:inline-block;border-radius:30px;overflow:hidden;box-shadow:0 25px 60px rgba(255,107,157,.3);border:3px solid rgba(255,255,255,.1)}
.hero-img-container img{width:100%;max-width:800px;height:auto;display:block;border-radius:30px}
.hero-img-overlay{position:absolute;bottom:0;left:0;right:0;padding:40px 30px;background:linear-gradient(to top,rgba(26,26,46,.9),transparent);text-align:center}
.hero-img-overlay h2{font-size:2.2rem;font-weight:900;margin-bottom:10px;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-img-overlay p{font-size:1.1rem;color:rgba(255,255,255,.8)}
.stats{display:flex;justify-content:center;gap:50px;padding:40px 30px;flex-wrap:wrap}
.st{text-align:center;padding:20px;background:rgba(255,255,255,.05);border-radius:20px;border:1px solid rgba(255,255,255,.1);min-width:150px;transition:all .3s}
.st:hover{transform:translateY(-10px);border-color:var(--p);box-shadow:0 10px 30px rgba(255,107,157,.2)}
.sn{font-size:2.5rem;font-weight:900;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sl{color:rgba(255,255,255,.6);font-weight:600}
.cs{padding:80px 30px;max-width:1400px;margin:0 auto}
.sh{text-align:center;margin-bottom:60px}
.sh h2{font-size:3rem;font-weight:900;margin-bottom:15px}
.sh p{color:rgba(255,255,255,.6);font-size:1.2rem}
.tabs{display:flex;justify-content:center;gap:15px;margin-bottom:50px;flex-wrap:wrap}
.tab{padding:14px 35px;border:2px solid rgba(255,255,255,.1);border-radius:50px;font-family:'Cairo',sans-serif;font-size:1.1rem;font-weight:800;cursor:pointer;transition:all .4s;background:transparent;color:rgba(255,255,255,.7)}
.tab:hover,.tab.active{background:var(--g);color:#fff;border-color:transparent;transform:translateY(-3px);box-shadow:0 10px 30px rgba(255,107,157,.3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:35px}
.card{background:rgba(255,255,255,.05);border-radius:25px;overflow:hidden;border:1px solid rgba(255,255,255,.1);transition:all .5s;position:relative}
.card:hover{transform:translateY(-15px) scale(1.02);border-color:rgba(255,107,157,.5);box-shadow:0 25px 50px rgba(0,0,0,.3)}
.cimg{width:100%;height:300px;object-fit:cover;transition:transform .6s}
.card:hover .cimg{transform:scale(1.1)}
.badge2{position:absolute;top:20px;right:20px;padding:8px 20px;background:var(--g);color:#fff;font-weight:800;border-radius:20px;font-size:.85rem;box-shadow:0 5px 15px rgba(0,0,0,.2);z-index:2}
.cinfo{padding:25px}
.cn{font-size:1.3rem;font-weight:800;margin-bottom:10px}
.cp{font-size:1.6rem;font-weight:900;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
.add{width:100%;padding:15px;border:2px solid rgba(255,255,255,.2);border-radius:15px;background:transparent;color:#fff;font-family:'Cairo',sans-serif;font-size:1.1rem;font-weight:800;cursor:pointer;transition:all .4s}
.add:hover{background:var(--g);border-color:transparent;transform:scale(1.02);box-shadow:0 10px 30px rgba(255,107,157,.4)}
.add.added{background:#27ae60;border-color:#27ae60}
.cartS{position:fixed;top:0;left:-450px;width:450px;height:100vh;background:rgba(26,26,46,.95);backdrop-filter:blur(30px);border-right:1px solid rgba(255,255,255,.1);z-index:2000;transition:left .5s;display:flex;flex-direction:column}
.cartS.open{left:0}
.ch{padding:30px;background:var(--g);color:#fff;display:flex;justify-content:space-between;align-items:center}
.ch h2{font-size:1.5rem;display:flex;align-items:center;gap:12px}
.close{background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;transition:transform .3s}
.close:hover{transform:rotate(90deg)}
.ci{flex:1;overflow-y:auto;padding:25px}
.citem{display:flex
